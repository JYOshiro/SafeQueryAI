# Jekyll configuration for GitHub Pages
title: SafeQueryAI Documentation
description: Privacy-first document Q&A with local RAG
url: "https://jyoshiro.github.io/SafeQueryAI"
baseurl: "/SafeQueryAI"

# Theme
theme: jekyll-theme-minimal

# Navigation
header_pages:
  - index.md
  - getting-started.md
  - architecture.md
  - api-documentation.md
  - frontend-guide.md
  - configuration.md
  - deployment.md
  - development.md
  - faq.md

# SEO and social
author: Jessica Y. Oshiro
social:
  links:
    - https://github.com/JYOshiro/SafeQueryAI
    - https://www.linkedin.com/in/jessica-oshiro-45a99693

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-sitemap
  - jekyll-feed

# Defaults
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
